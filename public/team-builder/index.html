<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armador de Equipos de Fútbol</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f0f8f0; }
    .accent { color: #2e7d32; }
    .table-container { max-width: 600px; margin: auto; }
    .teams { margin-top: 1rem; }
    .team-box { border: 2px solid #2e7d32; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; }
    .list-group-item { cursor: pointer; }
    .highlight { background-color: #c8e6c9 !important; }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h1 class="text-center accent mb-4"><i class="bi bi-ball"></i> FUTBOL PAPA ⚽️⚽️</h1>

    <div class="mb-3">
      <label for="inputList" class="form-label">Pega la lista de jugadores (1 por línea):</label>
      <textarea id="inputList" class="form-control" rows="6" placeholder="1. Manu&#10;2. Chipi ..."></textarea>
    </div>
    <button id="btnGenerateTeams" class="btn btn-primary mb-3">Generar equipos</button>
    <button id="btnReshuffle" class="btn btn-outline-secondary mb-3" disabled>Mezclar de nuevo</button>

    <div id="teamsContainer" class="teams row"></div>
    <div id="warning" class="text-danger fw-bold"></div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
